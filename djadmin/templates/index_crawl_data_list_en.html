
{% for cat in cat_data %}

{% if forloop.first %}
<div class="col-sm-12" style="margin-top: 30px">{% endif %}
    <div class="col-sm-3">
        <div class="card-header">{{ cat.cat_name }}
            <a style="font-size: 12px;float: right"
               href="{% url 'crawl_label:crawl_label_datalist_en' cat.cat_id %}">More</a>
        </div>
        <div class="card-body">

            <ul class="list-group">
                {% for dat in cat.data%}
                <li class="list-group-item">
                    <a href="{% url 'crawl_document_en:crawldoc_en_view' dataid=dat.id%}">
                        {{ dat.title }}
                    </a>

                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
    {% if forloop.counter|divisibleby:4 %}
</div>
<div class="col-sm-12" style="margin-top: 30px">
    {% endif %}
    {% if forloop.last %}
</div>
{% endif %}
{% endfor %}
<div style="clear:both;"></div>
