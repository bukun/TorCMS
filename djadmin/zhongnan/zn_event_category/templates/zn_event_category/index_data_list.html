
{% for cat in cat_data %}

{% if forloop.first %}
<div class="row">
<div class="panel panel-default" style="margin-top: 30px">{% endif %}
    <div class="col-sm-3">
        <div class="panel-heading">{{ cat.cat_name }}
            <a style="font-size: 12px;float: right"
               href="{% url 'zn_event_category:category_datalist' cat.cat_id %}">More</a>
        </div>


        <ul class="list-group">
            {% for dat in cat.data%}
            <li class="list-group-item">
                <a href="{% url 'zn_event:data_view' dataid=dat.id%}">
                    {{ dat.title }}
                </a>

            </li>
            {% endfor %}
        </ul>
    </div>

    {% if forloop.counter|divisibleby:4 %}
</div>
<div class="panel panel-default" style="margin-top: 30px">
    {% endif %}
    {% if forloop.last %}
</div>
</div>
{% endif %}
{% endfor %}
<div style="clear:both;"></div>
