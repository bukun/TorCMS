
{% for cat in cat_data %}


    {% if forloop.first %}
        <div class="row">{% endif %}
<div class="col-sm-3">

        <div class="card-header">{{ cat.cat_name }}
            <a style="font-size: 12px;float: right"
               href="{% url 'jupyter_category:category_datalist' cat.cat_id %}">More</a>
        </div>

 <div class="card-body">
        <ul class="list-group">
            {% for dat in cat.data %}
                <li class="list-group-item" style="overflow: hidden; text-overflow:ellipsis; white-space: nowrap;">
                   <a href="{% url 'jupyter_data:data_view' dataid=dat.id %}">
                       <span class="fa fa-file-text-o"></span> {{ dat.title }}
                    </a>

                </li>
            {% endfor %}
        </ul>

    </div>
</div>
{% if forloop.counter|divisibleby:4 %}
    </div>
    <div class="row">
{% endif %}
{% if forloop.last %}
    </div>
{% endif %}

{% endfor %}
<div style="clear:both;"></div>
