          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>

        .news-w3lgrids {
            padding: 15px;
        }

        .news-w3lgrids {
            width: 20%;
        }

        .news-gridtext {
            margin: 0 0.5em;
            -webkit-box-shadow: -2px 4px 5px rgba(25, 13, 15, 0.17);
            -moz-box-shadow: -2px 4px 5px rgba(25, 13, 15, 0.17);
            box-shadow: -2px 4px 5px rgba(25, 13, 15, 0.17);
            -webkit-transition: 0.5s all;
            -moz-transition: 0.5s all;
            transition: 0.5s all;
        }

        .news-gridtext:hover {
            box-shadow: -2px 4px 30px rgba(25, 13, 15, 0.38);
        }

        .news-w3img {
            padding-top: 20px;
            overflow: hidden;
        }

        .news-w3img img {
            width: 100%;
            -webkit-transition: all 0.7s ease-in-out;
            -moz-transition: all 0.7s ease-in-out;
            -o-transition: all 0.7s ease-in-out;
            -ms-transition: all 0.7s ease-in-out;
            transition: all 0.7s ease-in-out;
        }

        .news-w3img img:hover {
            -webkit-transform: scale(1.1);
            -ms-transform: scale(1.1);
            -o-transform: scale(1.1);
            transform: scale(1.1);
        }

        .news-w3imgtext {
            padding: 15px;
            line-height: 30px;

        }

        .cent {
            color: #004299;
            font-size: 2rem;
            text-align: center;
            margin: 5px auto;
        }
    </style>

<div class="container">
    <div class="row">
        <div class="col-sm-12">
            <h1 style="text-align: center;padding: 50px 0 60px 0">
                科学计算模型在线研究协作系统</h1>

        </div>
    </div>
    <div class="row">
        <div class="col-lg-8 col-md-8 col-xs-12">
            <div class="row">
                <div class="col-sm-12">
                    {% include "./sys_jupyter_list.html" with cat_data=cat_data %}
                </div>
            </div>
        </div>
        <div class="col-lg-4 col-md-4 col-xs-12">
            {% include "./jupyter_right.html" %}
        </div>

    </div>


</div>


<script type="text/javascript">
    function open_dc_system() {
        var selectedValue = $("#dc_image").val();
        var user = "{{ user.username }}";
        // 使用返回的CSRF token设置全局AJAX请求的header
        $.ajaxSetup({
            data: {csrfmiddlewaretoken: '{{ csrf_token }}'},
        });
        $.ajax({
            url: '/jupyter_data/open_dc_system/',
            type: 'POST',
            data: {
                'dc_image': selectedValue,
                'user': user,
            },

            success: function (htmlString) {

                var newWindow = window.open('', '_blank');
                newWindow.document.write(htmlString);
            }
        });
    }
</script>
</body>
</html>
