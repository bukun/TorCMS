{% extends 'iga_base.html' %}

{% block head %}
    <title>{{ cat_name }} List</title>
{% endblock %}
{% block mainbody %}
    <div class="row">

        <div class="card-header">
            <h3>学科组名称: {{ cat_name }}</h3>
            <hr/>
        </div>
        <div class="card-body">

            <table class="table table-striped">
                <thead>
                <tr>
                    <th scope="col">房间号</th>
                    <th scope="col">名称</th>
                    <th scope="col">面积</th>
                    <th scope="col">使用人员</th>
                    <th scope="col">所属楼</th>
                    <th scope="col">所在楼层</th>
                </tr>
                </thead>
                <tbody>
                {% for dat in data %}

                    <tr>
                        <td>{{ dat.num }}</td>
                        <td>{{ dat.title }}</td>
                        <td>{{ dat.area }}</td>
                        <td>{{ dat.staff }}</td>
                        <td>{{ dat.building }}楼</td>
                        <td>
                            {{ dat.floor }}楼
                        </td>
                    </tr>

                {% endfor %}
                </tbody>
            </table>


        </div>
    </div>
{% endblock %}
