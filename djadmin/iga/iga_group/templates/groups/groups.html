{% extends 'iga_base.html' %}
{% load static %}

{% block head %}
    <title> 学科组列表</title>
    <style>

        #map_div {
            width: 100%;
            height: 420px;
            border: 1px solid black;
            text-align: center;
            align-self: center;
            z-index: 1;
        }
    </style>
{% endblock %}
{% block mainbody %}
    <div class="row">
        <div class="map_div" id="map_div"></div>
    </div>
    <div class="wrapper">
        <div class="content">

            {% include "./index_group_list.html" with data=cat_data %}
        </div>
    </div>

    <SCRIPT>
        $(document).ready(function () {
            var popup = L.popup();

            function onMapClick(e) {
                popup
                    .setLatLng(e.latlng)
                    .setContent("Location:" + e.latlng.toString())
                    .openOn(map);
            }

            var osm = L.tileLayer.chinaProvider('TianDiTu.Normal.Map', {
                id: "mapbox.streets"
            });

            var map = L.map('map_div', {
                center: [43.9985, 125.3964],
                zoom: 16,
                maxZoom: 22,
                minZoom: 1,
            });
            osm.addTo(map)
            map.on('click',onMapClick)
            var geojsonStyle = {
                color: '#222',
                weight: 1,
                opacity: 0.9,
                fillColor: '#fd8788',
                fillOpacity: 0.8
            };
            fetch('https://martin.igadc.cn/')
                .then(response => response.json())
                .then(data => {
                    var geojsonLayer = L.geoJson(data, {
                        style: function () {
                            return geojsonStyle;
                        },
                        onEachFeature: function (feature, layer) {

                            layer.bindTooltip('<div><b>Name:' + feature.properties.name + '</b></div>' +
                                '<div><b>所属楼:' + feature.properties.floor + '楼</b></div>' +
                                '<div><b>房间号:' + feature.properties.roomid + '</b></div>', {
                                permanent: false,
                            });
                            layer.on('mouseover', function (e) {
                                e.target.setStyle({
                                    fillColor: '#0e8abd',
                                    fillOpacity: 0.6
                                });
                            });
                            layer.on('mouseout', function (e) {
                                e.target.setStyle({
                                        fillColor: '#fd8788',
                                        fillOpacity: 0.8,
                                    }
                                ); // 使用之前的样式
                            });
                        }
                    }).addTo(map);
                })
                .catch(error => {
                    console.error('Error fetching GeoJSON:', error);
                });

        })


    </script>
{% endblock %}
