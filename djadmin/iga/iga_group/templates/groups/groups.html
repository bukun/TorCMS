{% extends 'iga_base.html' %}
{% load static %}

{% block head %}
    <title> 学科组列表</title>
    <style>

        #map_div {
            width: 100%;
            height: 420px;
            border: 1px solid black;
            text-align: center;
            align-self: center;
            z-index: 1;
        }
    </style>
{% endblock %}
{% block mainbody %}
    <div class="row">
        <div class="map_div" id="map_div"></div>
    </div>
    <div class="wrapper">
        <div class="content">

            {% include "./index_group_list.html" with data=cat_data %}
        </div>
    </div>

    <SCRIPT>
        $(document).ready(function () {
            var popup = L.popup();

            function onMapClick(e) {
                popup
                    .setLatLng(e.latlng)
                    .setContent("Location:" + e.latlng.toString())
                    .openOn(map);
            }

            var osm = L.tileLayer.chinaProvider('TianDiTu.Normal.Map', {
                id: "mapbox.streets"
            });

            var map = L.map('map_div', {
                center: [43.9985, 125.3964],
                zoom: 16,
                maxZoom: 22,
                minZoom: 1,
            });


            var gl = L.maplibreGL({
                style: 'https://demotiles.maplibre.org/style.json',
                interactive: true
            }).addTo(map);


            var maplibreMap = gl.getMaplibreMap();

            var paint = {

                'fill-extrusion-color': '#fd8788',
                "fill-extrusion-height": ["get", "height"],
                "fill-extrusion-base": ["get", "height"],
                "fill-extrusion-opacity": 1,
                // "fill-extrusion-ambient-occlusion-ground-attenuation": 0.6,

            }
            maplibreMap.on('load', () => {
                maplibreMap.addSource('tdt', {
                    type: 'raster',
                    tiles: ['http://t4.tianditu.gov.cn/DataServer?T=img_w&X={x}&Y={y}&L={z}&tk=57f1b8146ef867f14189f3f4bb1adc1c',
                        // 'http://t4.tianditu.gov.cn/DataServer?T=cia_w&X={x}&Y={y}&L={z}&tk=57f1b8146ef867f14189f3f4bb1adc1c',
                    ],
                    tileSize: 256
                });
                maplibreMap.addLayer({
                    id: 'tdt-layer',
                    type: 'raster',
                    source: 'tdt',
                    minzoom: 0,
                });
                maplibreMap.addLayer({
                    id: 'pp',
                    type: 'fill-extrusion',
                    source: {
                        type: 'vector',
                        url: 'http://39.100.72.56:6799/pp'
                        {#url: 'https://martin.igadc.cn/pp'#}
                    },
                    'source-layer': 'pp',
                    paint: paint,
                });
                maplibreMap.addLayer({
                    'id': 'boundary-line',
                    'type': 'line',
                    'source': {
                        type: 'vector',
                        url: 'http://39.100.72.56:6799/pp'
                        {#url: 'https://martin.igadc.cn/pp'#}
                    }, // 同样替换为你的数据源ID
                    'source-layer': 'pp',
                    'paint': {
                        'line-color': '#333', // 线的颜色
                        'line-width': 1 // 线的宽度
                    },
                    'layout': {
                        'visibility': 'visible' // 可以设置为'none'来隐藏图层
                    }
                });
                maplibreMap.addLayer({
                    // id: 'MULTIPOLYGON',
                    id: 'hightlight',
                    type: 'fill-extrusion',
                    source: {
                        type: 'vector',
                        url: 'http://39.100.72.56:6799/pp'
                    },
                    'source-layer': 'pp',
                    paint: {
                        'fill-extrusion-color': '#c1d6ff',

                    },
                    filter: ["==", "gid", ["get", "gid"]],
                });
            });
            maplibreMap.on('click', (e) => {
                const {point} = e;
                console.log(e)
                const clickedFeatures = maplibreMap.queryRenderedFeatures(point); // 查询点击处的要素
                var filter = clickedFeatures[0].properties.gid;
                console.log(clickedFeatures[0])
                console.log(filter)
                maplibreMap.setFilter("hightlight", ["in", "gid", filter]);

            })

        })


    </script>
{% endblock %}
