{% extends 'iga_base.html' %}
{% load static %}

{% block head %}
    <title> 学科组列表</title>
    <style>

        #map_div {
            width: 100%;
            height: 420px;
            border: 1px solid black;
            text-align: center;
            align-self: center;
            z-index: 1;
        }
    </style>
{% endblock %}
{% block mainbody %}
    <div class="row">
        <div class="map_div" id="map_div"></div>
    </div>
    <div class="wrapper">
        <div class="content">

            {% include "./index_group_list.html" with data=cat_data %}
        </div>
    </div>

    <SCRIPT>
        $(document).ready(function () {
            var popup = L.popup();

            function onMapClick(e) {
                popup
                    .setLatLng(e.latlng)
                    .setContent("Location:" + e.latlng.toString())
                    .openOn(map_idx);
            }

            var osm = L.tileLayer.chinaProvider('TianDiTu.Normal.Map', {
                id: "mapbox.streets"
            });


            var map_idx = L.map('map_div', {
                center: [43.9985, 125.3964],
                zoom: 16,
                maxZoom: 22,
                minZoom: 1,
            });
            map_idx.on('click', onMapClick);
            osm.addTo(map_idx);
            // 添加地图层
            L.tileLayer('http://39.100.72.56:6799/dls_poly',
                {attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'}).addTo(map_idx);

        })
    </script>
{% endblock %}
