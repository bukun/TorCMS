{% extends 'iga_base.html' %}
{% load static %}

{% block head %}
    <title> 学科组列表</title>
    <style>

        #map_div {
            width: 100%;
            height: 420px;
            border: 1px solid black;
            text-align: center;
            align-self: center;
            z-index: 1;
        }
    </style>
{% endblock %}
{% block mainbody %}
    <div class="row">
        <div class="map_div" id="map_div"></div>
    </div>
    <div class="wrapper">
        <div class="content">

            {% include "./index_group_list.html" with data=cat_data %}
        </div>
    </div>

    <SCRIPT>
        $(document).ready(function () {
            var popup = L.popup();

            function onMapClick(e) {
                popup
                    .setContent("Location:")
                    .openOn(map);
            }

            var osm = L.tileLayer.chinaProvider('TianDiTu.Normal.Map', {
                id: "mapbox.streets"
            });

            var map = L.map('map_div', {
                center: [43.9985, 125.3964],
                zoom: 16,
                maxZoom: 22,
                minZoom: 1,
            });
            osm.addTo(map)
            var geojsonStyle = {
                color: '#222',
                weight: 1,
                opacity: 0.9,
                fillColor: '#fd8788',
                fillOpacity: 0.8
            };
           fetch('http://39.100.72.56:6794')
                .then(response => response.json())
                .then(data => {
                    L.geoJson(data, {
                        style: function () {
                            return geojsonStyle;
                        },
                        onEachFeature: function (feature, layer) {
                            // 为图层添加点击事件
                            layer.on('click', function () {
                                // 在地图上弹出信息窗口
                                console.log('feature')
                                console.log(feature.properties.gid)
                                layer.bindPopup('testinfo').openPopup();
                            });
                        }
                    }).addTo(map);
                })
                .catch(error => {
                    console.error('Error fetching GeoJSON:', error);
                });

        })


    </script>
{% endblock %}
